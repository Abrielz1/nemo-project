syntax = "proto3";
option java_package = "ru.nemo_project.hr.grpc";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
message CreateBalanceRequest {
  string employee_id = 1;
  int64 initial_minutes = 2;
}
message OvertimeBalance {
  string employee_id = 1;
  int64 minutes_accumulated = 2;
}
message GetBalanceRequest {
  string employee_id = 1;
}
message UpdateBalanceRequest {
  string employee_id = 1;
  optional int64 minutes_to_change = 2;
}
message DeleteBalanceRequest {
  string employee_id = 1;
}
service OvertimeBalanceService {
  rpc GetBalance(GetBalanceRequest) returns (OvertimeBalance);
  rpc CreateBalance(CreateBalanceRequest) returns (OvertimeBalance);
  rpc UpdateBalance(UpdateBalanceRequest) returns (OvertimeBalance);
  rpc DeleteBalance(DeleteBalanceRequest) returns (google.protobuf.Empty);
}